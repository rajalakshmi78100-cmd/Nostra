<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nostra - Contact</title>

    <link href="src/output.css" rel="stylesheet">

</head>


<body>


<!-- Navbar -->

<nav class="flex justify-between items-center px-10 py-5 shadow">

    <h1 class="text-3xl font-bold">
        NOSTRA
    </h1>


    <div class="hidden md:flex gap-8">

        <a href="index.html">Home</a>

        <a href="collections.html">Collections</a>

        <a href="contact.html">
            Contact
        </a>

    </div>


</nav>



<!-- Contact Section -->


<section class="max-w-6xl mx-auto mt-10 p-5">


    <h1 class="text-4xl font-bold text-center mb-10">
        Contact Us
    </h1>



    <div class="grid md:grid-cols-2 gap-10">


        <!-- Contact Information -->


        <div class="bg-black text-white p-8 rounded-lg">


            <h2 class="text-3xl font-bold mb-5">
                Get In Touch
            </h2>


            <p class="mb-5">
                We would love to hear from you.
                Feel free to contact us anytime.
            </p>


            <p class="mb-3">
                📍 Chennai, India
            </p>


            <p class="mb-3">
                📧 support@nostra.com
            </p>


            <p>
                ☎ +91 98765 43210
            </p>



        </div>




        <!-- Contact Form -->


        <div>


            <form class="flex flex-col gap-5">


                <input
                type="text"
                placeholder="Your Name"
                class="border p-3 rounded outline-none">


                <input
                type="email"
                placeholder="Your Email"
                class="border p-3 rounded outline-none">


                <input
                type="text"
                placeholder="Subject"
                class="border p-3 rounded outline-none">


                <textarea
                placeholder="Your Message"
                rows="5"
                class="border p-3 rounded outline-none"></textarea>



                <button
                class="bg-black text-white py-3 rounded hover:bg-gray-800">

                    Submit

                </button>



            </form>


        </div>



    </div>



</section>




<!-- Footer -->


<footer class="bg-black text-white mt-20 p-10 text-center">


    <h1 class="text-3xl font-bold">
        NOSTRA
    </h1>


    <p class="mt-3">
        Fashion that defines you.
    </p>


    <p class="mt-5">
        © 2026 Nostra. All Rights Reserved.
    </p>


</footer>



</body>

</html>
